<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="background-decor"></div>

<div class="todo-app">
    <header>
        <div class="header-top">
            <h2>Задачи</h2>
            <div class="stats-text">Всего задач: <b id="total-tasks">0</b></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-info">
            Выполнено: <span id="percent-complete">0%</span>
        </div>
    </header>

    <!-- Поиск с кнопкой -->
    <div class="search-row">
        <input type="text" id="search-input" placeholder="Найти задачу...">
        <button onclick="searchTasks()" class="search-btn">
            <i class="fas fa-search"></i>
        </button>
    </div>
    
    <!-- Поле ввода -->
    <div class="input-row">
        <input type="text" id="input-box" placeholder="Что нужно сделать?">
        <button onclick="addTask()">Добавить</button>
    </div>

    <div class="list-wrapper">
        <ul id="list-container">
            <!-- Сюда будут добавляться задачи -->
        </ul>
    </div>

    <div class="footer">
        <div class="detailed-stats">
            <div class="stat-box">Готово: <span id="done-count">0</span></div>
            <div class="stat-box">В работе: <span id="pending-count">0</span></div>
        </div>
        <button class="clear-btn" onclick="clearAll()">Удалить всё</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
