<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="background-decor"></div>

<div class="todo-app">
    <header>
        <div class="header-top">
            <h2>Мои задачи</h2>
            <div class="stats-text">Всего: <b id="total-tasks">0</b></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-info">
            Успеваемость: <span id="percent-complete">0%</span>
        </div>
    </header>

    <!-- Строка поиска -->
    <div class="input-group">
        <input type="text" id="search-input" placeholder="Поиск задач...">
        <button onclick="searchTasks()" class="btn-primary btn-search">Найти</button>
    </div>
    
    <!-- Строка добавления -->
    <div class="input-group">
        <input type="text" id="input-box" placeholder="Напишите новую задачу...">
        <button onclick="addTask()" class="btn-primary btn-add">Добавить</button>
    </div>

    <div class="list-wrapper">
        <ul id="list-container"></ul>
    </div>

    <div class="footer">
        <div class="detailed-stats">
            <div class="stat-box">Готово: <span id="done-count">0</span></div>
            <div class="stat-box">В работе: <span id="pending-count">0</span></div>
        </div>
        <button class="clear-btn" onclick="clearAll()">Очистить всё</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
