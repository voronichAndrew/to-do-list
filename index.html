<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="todo-app">
    <h2>
        Задачи 
        <img src="https://cdn-icons-png.flaticon.com/512/2666/2666505.png" alt="icon">
    </h2>
    
    <div class="row">
        <input type="text" id="input-box" placeholder="Что нужно сделать?">
        <button onclick="addTask()">OK</button>
    </div>

    <ul id="list-container">
        <!-- Место для задач -->
    </ul>
</div>

<script src="script.js"></script>
</body>
</html>
