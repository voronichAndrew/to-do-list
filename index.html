<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="background-decor"></div>

<div class="todo-app">
    <header>
        <div class="header-top">
            <h2 id="greeting">Мои задачи</h2>
            <div class="stats-text">
                <span id="total-tasks">0</span> задач всего
            </div>
        </div>

        <!-- Прогресс-бар -->
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-info">
            Выполнено: <span id="percent-complete">0%</span>
        </div>
    </header>

    <!-- Поле поиска -->
    <div class="search-row">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Поиск по списку..." onkeyup="searchTasks()">
    </div>
    
    <!-- Поле ввода -->
    <div class="input-row">
        <input type="text" id="input-box" placeholder="Добавить новую задачу...">
        <button onclick="addTask()">Добавить <i class="fas fa-plus"></i></button>
    </div>

    <!-- Список задач -->
    <div class="list-wrapper">
        <ul id="list-container">
            <!-- Задачи появятся здесь -->
        </ul>
    </div>

    <div class="footer">
        <div class="detailed-stats">
            <span><i class="fas fa-check-circle"></i> Готово: <b id="done-count">0</b></span>
            <span><i class="fas fa-clock"></i> В работе: <b id="pending-count">0</b></span>
        </div>
        <button class="clear-btn" onclick="clearAll()">Очистить всё</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
